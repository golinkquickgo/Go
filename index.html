<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 1. リファラ（どこから来たか）を隠してブロックを回避 -->
    <meta name="referrer" content="no-referrer">
    <title>読み込み中...</title>
    
    <script>
        // 2. JavaScriptによる高速リダイレクト（履歴に残さない）
        window.location.replace("https://lite.tiktok.com/t/ZS9RrPkyFnYRq-o9Cha/");
    </script>
    
    <!-- 3. 万が一JSが動かない場合の自動転送（0秒） -->
    <meta http-equiv="refresh" content="0;url=https://lite.tiktok.com/t/ZS9RrPkyFnYRq-o9Cha/">
</head>
<body>
    <!-- 4. 念のための手動リンク（デザインなし） -->
    <p style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        自動的に移動します。移動しない場合は<br>
        <a href="https://lite.tiktok.com/t/ZS9RrPkyFnYRq-o9Cha/" rel="noreferrer">【こちらをクリック】</a>してください。
    </p>
</body>
</html>
