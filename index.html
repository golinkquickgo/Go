<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画まとめ</title>
    <style>
        body {
            margin: 0;
            background: #f2f2f2;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .video-box {
            position: relative;
            width: 90%;
            max-width: 500px;
            height: 260px;
            background: black;
            margin: 20px auto;
            border-radius: 12px;
            /* ここに画像を表示 */
            background-image: url('https://files.manuscdn.com/user_upload_by_module/session_file/310519663358107416/tajZPBhHyWdvoiiV.PNG');
            background-size: cover; /* 画像をエリア全体に表示 */
            background-position: center; /* 画像を中央に配置 */
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>動画まとめ</h2>
        <p>新しく見つけ次第追加します</p>

        <!-- このdiv全体がクリック可能な領域になります -->
        <div class="video-box" onclick="window.location.href='https://lite.tiktok.com/t/ZS9d6btkpEF5S-YOBqR/'"> 
            <!-- 内側の要素は空のままで、背景画像として再生ボタン付き画像が表示されます -->
        </div>

    </div>

</body>
</html>
