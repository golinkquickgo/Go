<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画まとめ</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f2f5; /* 背景色をTikTokのライトモードに近づける */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 画面全体の高さに設定 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; /* iOS/Androidの標準フォントに近づける */
        }
        .container {
            text-align: center;
            cursor: pointer; /* クリック可能であることを示すカーソル */
        }
        .container img {
            width: 100%;
            max-width: 400px; /* 画像の最大幅を指定 */
            border-radius: 12px; /* 画像の角を丸くする */
        }
    </style>
</head>
<body>

    <div class="container" onclick="window.location.href='https://lite.tiktok.com/t/ZS9d6btkpEF5S-YOBqR/'">
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663358107416/tajZPBhHyWdvoiiV.PNG" alt="動画を再生">
    </div>

</body>
</html>
